<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Tour de France Performance & Doping Allegations</title>

  <meta
    name="description"
    content="Scatterplot visualization comparing Tour de France stage times with later doping allegations."
  />

  <link rel="stylesheet" href="../css/style.css" />
  <link href="https://cdn.jsdelivr.net/npm/prismjs/themes/prism.css" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/prismjs/prism.js"></script>
  <!-- D3 -->
  <script src="https://d3js.org/d3.v7.min.js"></script>
</head>

<body>

  <header>
    <h1>Tour de France Performance & Doping Allegations</h1>
    <p>
      Scatterplot analysis comparing stage times of Tour de France riders with
      later doping allegations.
    </p>
  </header>

  <main>

    <section class="container">

      <div class="header">
        <div id="description"></div>
      </div>

      <div class="figure-body">
        <div id="scatter"></div>
        <div id="tooltip"></div>
      </div>

      <figcaption class="figure-caption">
        Each point represents a rider. The visualization contrasts racing
        performance with retrospective doping allegations, highlighting
        structural performance differences.
      </figcaption>

    </section>
    <section class="container">
      <h2>Implementation</h2>

      <details class="d3-code-block" data-block="data" data-file="../js/scatter.js">
        <summary>Data Preparation</summary>
        <pre><code id="code-data" class="language-javascript"></code></pre>
      </details>

      <details class="d3-code-block" data-block="scales" data-file="../js/scatter.js">
        <summary>Scales & Encoding</summary>
        <pre><code id="code-scales" class="language-javascript"></code></pre>
      </details>

      <details class="d3-code-block" data-block="render" data-file="../js/scatter.js">
        <summary>Point Rendering</summary>
        <pre><code id="code-render" class="language-javascript"></code></pre>
      </details>

      <details class="d3-code-block" data-block="interaction" data-file="../js/scatter.js">
        <summary>Interaction (Tooltip)</summary>
        <pre><code id="code-interaction" class="language-javascript"></code></pre>
      </details>

      <details class="d3-code-block" data-block="axes" data-file="../js/scatter.js">
        <summary>Axes</summary>
        <pre><code id="code-axes" class="language-javascript"></code></pre>
      </details>

    </section>
    <section>
      <p>
        <a href="../index.html">← Back to overview</a>
      </p>
    </section>

  </main>
  <footer>
    <p>© <span id="year"></span> Christian Lurz</p>
  </footer>


  <script>
    document.getElementById("year").textContent = new Date().getFullYear();
  </script>
  <script src="../js/scatter.js"></script>
  <script src="../js/code-loader.js"></script>

</body>
</html>
